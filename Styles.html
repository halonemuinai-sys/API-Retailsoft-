<style>
/* Base Variables */
:root {

}

}

}

.page-title h2 { font-size: 1.5rem; font-weight: 600; color: var(--text-main); }

/* Common UI Elements */

.date-input-group { display: flex; flex-direction: column; gap: 0.4rem; }

.loc-card .loc-value { font-size: 1.2rem; font-weight: 600; color: var(--accent); }

.chart-container { padding: 1.5rem; display: flex; flex-direction: column;}

/* Tables */
.table-container { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.table-header { display: flex; justify-content: space-between; align-items: center; }
.table-header h2 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem;}
.table-actions {
  display: flex;
  gap: 1rem;
}

.filter-dropdown {
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--panel-border);
  background: #ffffff;
  color: var(--text-main);
  margin-right: 10px;
  outline: none;
}

.filter-dropdown:focus {
  border-color: var(--primary);
}

.global-filter .filter-dropdown {
  margin: 0;
}

.table-actions input { background: #ffffff; border: 1px solid var(--panel-border); color: var(--text-main); padding: 0.6rem 1.2rem; border-radius: 20px; outline: none; width: 280px; }
.table-actions input:focus { border-color: var(--primary); }
.table-wrapper { overflow-x: auto; border-radius: 16px; border: 1px solid var(--panel-border); }
table { width: 100%; border-collapse: collapse; text-align: left; }
th { background: #f8fafc; padding: 1.2rem 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; border-bottom: 1px solid var(--panel-border); white-space: nowrap; }

.text-center { text-align: center; }
.text-right { text-align: right; }
.text-muted-empty { color: var(--text-muted); padding: 3rem !important; }

.dr-header-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }

.btn-excel { background: #10b981 !important; }
