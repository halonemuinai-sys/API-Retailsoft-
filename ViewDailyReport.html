<div class="view-report-container">
    <!-- Sub-Header with Actions and Filters (CRM Style) -->
    <div class="report-controls">
        <div class="report-title-group">
            <h2>Daily Report</h2>
            <p>View, filter, export, and email daily store traffic and transaction data.</p>
        </div>
        
        <div class="report-filters-group">
            <select id="drFilterLocation" class="filter-input-alt" title="Select Location">
                <option value="All">All Locations</option>
                <option value="Plaza Indonesia">Plaza Indonesia</option>
                <option value="Plaza Senayan">Plaza Senayan</option>
                <option value="Bali">Bali</option>
            </select>
            
            <select id="drFilterMonth" class="filter-input-alt" title="Select Month">
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>

            <select id="drFilterQuarter" class="filter-input-alt" title="Select Quarter">
                <option value="">- Monthly Only -</option>
                <option value="Q1">Q1 (Jan-Mar)</option>
                <option value="Q2">Q2 (Apr-Jun)</option>
                <option value="Q3">Q3 (Jul-Sep)</option>
                <option value="Q4">Q4 (Oct-Dec)</option>
            </select>
            
            <select id="drFilterYear" class="filter-input-alt" title="Select Year">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>

            <button onclick="app.fetchDailyReport()" class="btn-action btn-filter">
                <i class="fa-solid fa-magnifying-glass"></i> Filter
            </button>
            
            <button onclick="app.exportDailyReportExcel()" class="btn-action btn-excel">
                <i class="fa-solid fa-file-excel"></i> Excel
            </button>
            
            <button onclick="app.sendDailyReportEmailPrompt()" class="btn-action btn-email">
                <i class="fa-solid fa-envelope"></i> Email
            </button>
        </div>
    </div>

    <!-- Summary Metrics Section (Always Visible) -->
    <div id="drSummaryRow" class="report-summary-layout">
        <!-- Traffic Breakdown -->
        <div class="summary-card">
            <div class="summary-card-header">
                <h3>Traffic Summary</h3>
            </div>
            <div class="summary-table-wrapper">
                <table id="tblDrTrafficSummary">
                    <tbody id="tbDrTrafficSummary">
                        <tr><td class="text-center py-4 text-slate-400">No data loaded</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Advisor Performance -->
        <div class="summary-card">
            <div class="summary-card-header">
                <h3>Advisor Handling</h3>
            </div>
            <div class="summary-table-wrapper">
                <table id="tblDrAdvisorSummary">
                    <tbody id="tbDrAdvisorSummary">
                        <tr><td class="text-center py-4 text-slate-400">No data loaded</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Main Data Table -->
    <div class="table-container-full">
        <div class="table-full-header">
            <div class="table-title-search">
                <h3>Detailed Traffic Log</h3>
                <div class="search-box-alt">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="drSearchInput" placeholder="Search data..." onkeyup="app.filterDailyReportTable()">
                </div>
            </div>
            <div id="drRowCountBadge" class="row-count-badge">0 Rows</div>
        </div>
        
        <div class="table-wrapper-large">
            <table id="tblDrMain">
                <thead id="tblDrMainHead">
                    <!-- Dynamic Headers -->
                </thead>
                <tbody id="tblDrMainBody">
                    <tr>
                        <td colspan="10" class="text-center">Click Filter to load data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
